<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Catatan Harian</title>
    <style>
        /* Mengatur reset dasar dan font */
        * { 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        body { 
            background-color: #f4f7f6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        
        /* Membentuk container seperti layar HP (Frame) */
        .mobile-frame { 
            background-color: white; 
            width: 100%; 
            max-width: 375px; /* Ukuran standar layar mobile */
            padding: 40px 20px; 
            border-radius: 20px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            text-align: center; 
        }
        
        /* Komponen Image */
        .logo { 
            width: 90px; 
            margin-bottom: 20px; 
        }
        
        /* Komponen Text - Hierarki Visual */
        h1 { 
            font-size: 24px; 
            font-weight: bold; 
            color: #333; 
            margin: 0 0 10px 0; 
        }
        p { 
            font-size: 14px; 
            color: #666; 
            margin-bottom: 30px; 
        }
        
        /* Komponen Input */
        input { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 15px; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            font-size: 14px; 
        }
        input:focus { 
            border-color: #4A90E2; 
            outline: none; 
        }
        
        /* Komponen Button */
        button { 
            width: 100%; 
            padding: 15px; 
            background-color: #4A90E2; /* Nuansa biru untuk konsistensi */
            color: white; 
            border: none; 
            border-radius: 10px; /* Sudut membulat */
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: background 0.3s; 
            margin-top: 10px;
        }
        button:hover { 
            background-color: #357abd; 
        }
    </style>
</head>
<body>

    <div class="mobile-frame">
        <!-- 1. Image -->
        <img src="https://cdn-icons-png.flaticon.com/512/3233/3233483.png" alt="Logo Aplikasi" class="logo">
        
        <!-- 2 & 3. Text (Judul dan Sub-judul) -->
        <h1>Selamat Datang</h1>
        <p>Silakan masuk untuk menulis catatanmu</p>
        
        <!-- 4. Input Field (Email dan Password) -->
        <input type="email" id="email" placeholder="Alamat Email">
        <input type="password" id="password" placeholder="Kata Sandi">
        
        <!-- 5. Button -->
        <button onclick="login()">Masuk</button>
    </div>

    <!-- Interaksi Dasar JavaScript -->
    <script>
        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if(email && password) {
                alert("Login berhasil! Selamat datang di Catatan Harianmu.");
            } else {
                alert("Harap isi email dan kata sandi terlebih dahulu.");
            }
        }
    </script>

</body>
</html>
